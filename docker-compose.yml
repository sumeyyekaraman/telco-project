version: "3.8"

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_xe_telecom
    ports:
      - "1521:1521"   
      - "5500:5500"   
    environment:
      ORACLE_PASSWORD: Oracle123      
      APP_USER: TELECOM               
      APP_USER_PASSWORD: Telecom123   
    volumes:
      - oracle_data:/opt/oracle/oradata           
      - ./init-scripts:/container-entrypoint-initdb.d 
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  

volumes:
  oracle_data:
    driver: local
